name: 自动解压分卷并打包APK
on:
  workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库全部文件
        uses: actions/checkout@v4

      - name: 安装7z解压工具
        run: sudo apt update && sudo apt install p7zip-full -y

      - name: 合并分卷压缩包并解压源码
        run: |
          cat A6403A5B2.Z* > source.zip
          7z x source.zip -o./
          rm -rf source.zip A6403A5B2.Z*

      - name: 配置Java17编译环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 自动安装Android SDK
        uses: android-actions/setup-android@v3

      - name: 赋予Gradle执行权限
        run: chmod +x gradlew

      - name: 编译生成调试APK
        run: ./gradlew assembleDebug

      - name: 上传打包好的APK
        uses: actions/upload-artifact@v4
        with:
          name: 最终APK安装包
          path: app/build/outputs/apk/debug/app-debug.apk
