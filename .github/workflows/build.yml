name: 自动打包APK
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install p7zip-full -y
      - run: |
          cat a6403a5b2.z01 a6403a5b2.z02 a6403a5b2.z03 a6403a5b2.z04 a6403a5b2.z05 a6403a5b2.z06 a6403a5b2.z07 a6403a5b2.z08 a6403a5b2.z09 a6403a5b2.z10 a6403a5b2.z11 a6403a5b2.z12 a6403a5b2.z13 a6403a5b2.z14 a6403a5b2.z15 a6403a5b2.z16 a6403a5b2.z17 a6403a5b2.z18 a6403a5b2.z19 a6403a5b2.z20 a6403a5b2.z21 a6403a5b2.z22 a6403a5b2.z23 a6403a5b2.zip > full.zip
          7z x full.zip
          7z x 508c593abd5a4553bec2090a6403a5b2.zip
          rm -rf full.zip *.z* 508c593abd5a4553bec2090a6403a5b2.zip
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: 最终APK安装包
          path: app/build/outputs/apk/debug/app-debug.apk
